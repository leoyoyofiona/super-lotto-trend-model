databases:
  - name: super-lotto-visit-db
    databaseName: super_lotto_visit_db
    user: super_lotto_visit_user
    plan: free
    region: oregon

services:
  - type: web
    name: super-lotto-trend-model
    runtime: node
    plan: free
    autoDeploy: true
    healthCheckPath: /healthz
    buildCommand: npm ci --include=dev --ignore-scripts && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.12.0
      - key: VISIT_DATABASE_URL
        fromDatabase:
          name: super-lotto-visit-db
          property: connectionString
